<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{ .Title }} · Bigtree</title>
  <link rel="stylesheet" href="/static/css/style.css">
</head>
<body class="auth-body">
  <main class="auth-card">
    <div class="brand"><span class="brand-mark">B</span> Bigtree <em>Products</em></div>
    <h1>Sign in</h1>
    <p class="muted">Access the B2B product catalog.</p>

    {{ if .Error }}<div class="alert">{{ .Error }}</div>{{ end }}

    <form method="post" action="/login" class="stack">
      <label>Email
        <input type="email" name="email" value="{{ .Email }}" required autofocus autocomplete="email">
      </label>
      <label>Password
        <input type="password" name="password" required autocomplete="current-password">
      </label>
      <button type="submit" class="btn btn-primary">Sign in</button>
    </form>

    <p class="muted center">No account yet? <a href="/register">Create one</a>.</p>
  </main>
</body>
</html>
